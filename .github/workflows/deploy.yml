name: Pipeline CI-CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Mostrar archivos
        run: ls -la

      - name: Detener contenedor anterior
        run: |
          docker stop web || true
          docker rm web || true

      - name: Construir imagen Docker
        run: |
          docker build -t practica9-cicd:v1 .

      - name: Ejecutar contenedor
        run: |
          docker run -d \
          -p 8070:80 \
          --name web \
          practica9-cicd:v1

      - name: Verificar contenedor
        run: docker ps
